{% extends "base.html" %}
{% block page_title %}System{% endblock %}
{% block content %}

<h3>Services</h3>
<table role="grid">
    <thead>
        <tr>
            <th>Service</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for svc in services %}
        <tr>
            <td>{{ svc.name }}</td>
            <td>
                <span class="status-badge">
                    <span class="status-dot {% if svc.status == 'active' %}ok{% elif svc.status == 'failed' %}error{% else %}idle{% endif %}"></span>
                    {{ svc.status }}
                </span>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<h3>System Health</h3>
<div class="card-grid"
     hx-get="/api/status"
     hx-trigger="load, every 10s"
     hx-swap="innerHTML"
     hx-target="#health-cards">
    <div id="health-cards">
        <article class="data-card">
            <h3>Loading...</h3>
            <div class="value">
                <span class="status-badge">
                    <span class="status-dot idle"></span>
                    Connecting...
                </span>
            </div>
        </article>
    </div>
</div>

<script>
document.body.addEventListener("htmx:beforeSwap", function(evt) {
    if (evt.detail.target.id !== "health-cards") return;
    try {
        var data = JSON.parse(evt.detail.serverResponse);
        var html = "";
        if (data.cpu_temp !== undefined) {
            html += '<article class="data-card"><h3>CPU Temp</h3>';
            html += '<div class="value">' + data.cpu_temp + '&deg;C</div></article>';
        }
        if (data.ram !== undefined) {
            html += '<article class="data-card"><h3>RAM</h3>';
            html += '<div class="value">' + data.ram + '%</div></article>';
        }
        if (data.disk !== undefined) {
            html += '<article class="data-card"><h3>Disk</h3>';
            html += '<div class="value">' + data.disk + '%</div></article>';
        }
        if (html) {
            evt.detail.serverResponse = html;
        }
    } catch(e) {
        // Not JSON — let HTMX handle it normally
    }
});
</script>

<h3>Config Backup &amp; Restore</h3>
<div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
    <a href="/api/backup" download="voice-secretary-backup.json" role="button" class="outline">Download Backup</a>
    <label role="button" class="outline" style="cursor: pointer;">
        Upload Restore
        <input type="file" id="restore-file" accept=".json" style="display: none;" onchange="restoreConfig(this)">
    </label>
</div>
<script>
function restoreConfig(input) {
    if (!input.files.length) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        fetch('/api/restore', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: e.target.result})
        .then(function(r) { return r.json(); })
        .then(function() { alert('Config restored successfully.'); location.reload(); })
        .catch(function() { alert('Restore failed.'); });
    };
    reader.readAsText(input.files[0]);
    input.value = '';
}
</script>

{% endblock %}
