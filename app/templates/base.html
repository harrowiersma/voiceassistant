<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Voice Secretary{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pico.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    <script src="{{ url_for('static', filename='js/htmx.min.js') }}" defer></script>
</head>
<body>
    <div class="layout">
        <nav class="sidebar" aria-label="Main navigation">
            <header class="sidebar-header">
                <strong>Voice Secretary</strong>
            </header>

            <div class="nav-group">
                <small class="nav-group-label">Monitor</small>
                <ul>
                    <li><a href="/" class="{% if request.endpoint == 'dashboard.home' %}active{% endif %}">Home</a></li>
                    <li><a href="/calls" class="{% if request.endpoint == 'calls.index' %}active{% endif %}">Call Log</a></li>
                </ul>
            </div>

            <div class="nav-group">
                <small class="nav-group-label">Configure</small>
                <ul>
                    <li><a href="/persona" class="{% if request.endpoint == 'persona.index' %}active{% endif %}">Persona</a></li>
                    <li><a href="/knowledge" class="{% if request.endpoint == 'knowledge.index' %}active{% endif %}">Knowledge Base</a></li>
                    <li><a href="/availability" class="{% if request.endpoint == 'availability.index' %}active{% endif %}">Availability</a></li>
                    <li><a href="/sip" class="{% if request.endpoint == 'sip.index' %}active{% endif %}">SIP Settings</a></li>
                    <li><a href="/ai" class="{% if request.endpoint == 'ai.index' %}active{% endif %}">AI Settings</a></li>
                    <li><a href="/actions" class="{% if request.endpoint == 'actions.index' %}active{% endif %}">Actions</a></li>
                </ul>
            </div>

            <div class="nav-group">
                <small class="nav-group-label">System</small>
                <ul>
                    <li><a href="/system" class="{% if request.endpoint == 'system_mgmt.index' %}active{% endif %}">System</a></li>
                </ul>
            </div>

            <footer class="sidebar-footer">
                <button id="theme-toggle" class="outline secondary" onclick="toggleTheme()">
                    Toggle Theme
                </button>
            </footer>
        </nav>

        <main class="content">
            <header class="content-header">
                <h1>{% block page_title %}Dashboard{% endblock %}</h1>
            </header>
            <section class="content-body">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>

    <script>
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
    }
    // Restore saved theme
    const saved = localStorage.getItem("theme");
    if (saved) document.documentElement.setAttribute("data-theme", saved);
    </script>
</body>
</html>
