{% extends "base.html" %}
{% block page_title %}Call Log{% endblock %}
{% block content %}

<div class="filter-bar">
    <label for="action-filter">Filter by action:</label>
    <select id="action-filter" onchange="filterCalls(this.value)">
        <option value="">All</option>
        <option value="forwarded">Forwarded</option>
        <option value="message_taken">Message Taken</option>
        <option value="voicemail">Voicemail</option>
    </select>
    <a href="/api/calls/export" role="button" class="outline ml-auto">Export CSV</a>
</div>

{% if calls %}
<figure>
<table role="grid">
    <thead>
        <tr>
            <th scope="col">Date/Time</th>
            <th scope="col">Caller</th>
            <th scope="col">Duration</th>
            <th scope="col">Reason</th>
            <th scope="col">Action</th>
        </tr>
    </thead>
    <tbody id="calls-table-body">
        {% for call in calls %}
        <tr data-action="{{ call.action_taken or '' }}">
            <td>{{ call.started_at[:16] | replace('T', ' ') if call.started_at else '—' }}</td>
            <td>
                {% if call.caller_name %}{{ call.caller_name }}{% endif %}
                {% if call.caller_number %}<br><small>{{ call.caller_number }}</small>{% endif %}
            </td>
            <td>
                {% if call.duration_seconds is not none %}
                    {% set mins = call.duration_seconds // 60 %}
                    {% set secs = call.duration_seconds % 60 %}
                    {{ mins }} min {{ secs }} sec
                {% else %}
                    —
                {% endif %}
            </td>
            <td>
                {% if call.reason %}
                    {{ call.reason[:50] }}{% if call.reason | length > 50 %}...{% endif %}
                {% else %}
                    —
                {% endif %}
            </td>
            <td>{{ (call.action_taken or '—') | replace('_', ' ') | title }}</td>
        </tr>
        {% if call._transcript_parsed %}
        <tr data-action="{{ call.action_taken or '' }}" class="transcript-row">
            <td colspan="5">
                <details>
                    <summary role="button" class="outline btn-sm">Show transcript</summary>
                    <div class="transcript-content">
                        {% for msg in call._transcript_parsed %}
                            <p><strong>{{ msg.role | default('unknown') | title }}:</strong> {{ msg.text | default('') }}</p>
                        {% endfor %}
                    </div>
                </details>
            </td>
        </tr>
        {% endif %}
        {% endfor %}
    </tbody>
</table>
</figure>
{% else %}
<div class="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
    <p>No calls recorded yet.</p>
    <p>Calls will appear here once your Voice Secretary answers its first call.</p>
    <div class="action">
        <a href="/sip" role="button">Configure SIP trunk</a>
    </div>
</div>
{% endif %}

<script>
function filterCalls(action) {
    var rows = document.querySelectorAll('#calls-table-body tr');
    rows.forEach(function(row) {
        if (!action || row.dataset.action === action) {
            row.style.display = '';
        } else {
            row.style.display = 'none';
        }
    });
}
</script>

{% endblock %}
